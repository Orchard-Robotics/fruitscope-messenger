name: deploy

# Pull requests run `terraform plan`. Merging to main builds the image and runs
# `terraform apply` — that is the production deploy.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

# Cancel superseded PR runs, but never interrupt an in-flight production deploy.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/verdant/verdant
  WEB_BUCKET: ${{ vars.GCP_PROJECT_ID }}-verdant-web

jobs:
  # Build the static SPA and hand it to the Terraform job as an artifact, which
  # uploads it to the GCS bucket (created by the same apply).
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm --workspace client run build
      - uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 1

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - id: meta
        run: echo "image=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false # single-arch image, no attestation manifest — faster push, cleaner for Cloud Run
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.IMAGE }}:latest
          # Persistent layer cache stored alongside the image in Artifact Registry
          # (faster + more reliable than the GHA cache for an image this size).
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max,image-manifest=true

  terraform:
    name: Terraform
    needs: [frontend, build]
    runs-on: ubuntu-latest
    # Serialize ALL Terraform invocations (PR plans + main applies) against the
    # shared remote state — a fixed group across refs so they queue instead of
    # racing the state lock. Never cancel an in-flight apply.
    concurrency:
      group: verdant-terraform-state
      cancel-in-progress: false
    defaults:
      run:
        working-directory: terraform
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - uses: actions/checkout@v4

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.terraform.d/plugin-cache
          key: tf-providers-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: tf-providers-

      - run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: ${{ github.workspace }}/client/dist

      - run: terraform init -input=false

      - name: Terraform plan (PRs)
        if: github.event_name == 'pull_request'
        run: terraform plan -input=false -lock-timeout=180s -var="container_image=${{ needs.build.outputs.image }}"

      - name: Terraform apply (deploy on merge to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false -lock-timeout=180s -var="container_image=${{ needs.build.outputs.image }}"

      # Upload the SPA to the bucket the apply just created/updated. Hashed assets
      # are immutable; index.html is written last with no-store so each deploy
      # flips atomically; then stale assets are pruned.
      - name: Publish frontend to GCS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          gcloud storage rsync -r -x '^index\.html$' client/dist "gs://${WEB_BUCKET}" \
            --cache-control="public, max-age=31536000, immutable"
          gcloud storage cp client/dist/index.html "gs://${WEB_BUCKET}/index.html" \
            --cache-control="no-store, max-age=0"
          gcloud storage rsync -r -d -x '^index\.html$' client/dist "gs://${WEB_BUCKET}" \
            --cache-control="public, max-age=31536000, immutable"
