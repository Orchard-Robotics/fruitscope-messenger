name: deploy

# Pull requests run `terraform plan`. Merging to main builds the image and runs
# `terraform apply` — that is the production deploy.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

# Cancel superseded PR runs, but never interrupt an in-flight production deploy.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/verdant/verdant
  WEB_BUCKET: ${{ vars.GCP_PROJECT_ID }}-verdant-web

jobs:
  # Build the static SPA and publish it to the GCS bucket behind Cloud CDN.
  # Only runs on deploy (push to main); PRs just validate via the build below.
  frontend:
    name: Build & publish frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm --workspace client run build

      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/setup-gcloud@v2

      - name: Publish to GCS (assets immutable, index.html last + no-store)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          # 1) Hashed assets first — immutable, cache forever. rsync (no --delete-unmatched
          #    yet) so old assets linger for in-flight clients during the swap.
          gcloud storage rsync -r -x '^index\.html$' client/dist "gs://${WEB_BUCKET}" \
            --cache-control="public, max-age=31536000, immutable"
          # 2) index.html last, never cached → atomically points at the new assets.
          gcloud storage cp client/dist/index.html "gs://${WEB_BUCKET}/index.html" \
            --cache-control="no-store, max-age=0"
          # 3) Now prune assets no client could still need.
          gcloud storage rsync -r -d -x '^index\.html$' client/dist "gs://${WEB_BUCKET}" \
            --cache-control="public, max-age=31536000, immutable"

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - id: meta
        run: echo "image=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false # single-arch image, no attestation manifest — faster push, cleaner for Cloud Run
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.IMAGE }}:latest
          # Persistent layer cache stored alongside the image in Artifact Registry
          # (faster + more reliable than the GHA cache for an image this size).
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max,image-manifest=true

  terraform:
    name: Terraform
    needs: [frontend, build]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
    steps:
      - uses: actions/checkout@v4

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.terraform.d/plugin-cache
          key: tf-providers-${{ hashFiles('terraform/.terraform.lock.hcl') }}
          restore-keys: tf-providers-

      - run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init -input=false

      - name: Terraform plan (PRs)
        if: github.event_name == 'pull_request'
        run: terraform plan -input=false -var="container_image=${{ needs.build.outputs.image }}"

      - name: Terraform apply (deploy on merge to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false -var="container_image=${{ needs.build.outputs.image }}"
